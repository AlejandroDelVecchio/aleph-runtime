<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Aleph - Visión Continua</title>
    <style>
        body { 
            font-family: "Georgia", serif; 
            max-width: 700px; 
            margin: 0 auto; 
            padding: 50px 20px;
            background-color: #0a0a0a; /* Fondo oscuro para mayor inmersión */
            color: #d4d4d4;
            line-height: 1.8;
            overflow-x: hidden;
        }
        h1 { 
            font-weight: normal; 
            text-align: center; 
            font-style: italic; 
            color: #888;
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 50px;
        }
        .controles {
            text-align: center;
            position: sticky;
            top: 20px;
            z-index: 100;
        }
        button { 
            padding: 10px 25px; 
            margin: 5px; 
            font-family: "Georgia", serif;
            font-size: 14px; 
            cursor: pointer;
            background-color: transparent;
            color: #888;
            border: 1px solid #444;
            transition: all 0.5s;
        }
        button:hover { border-color: #fff; color: #fff; }
        button:disabled { opacity: 0.3; cursor: default; }

        #el-aleph { 
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .vision {
            max-width: 500px;
            margin-bottom: 40px;
            text-align: center;
            opacity: 0;
            transform: scale(0.95);
            transition: all 2s ease-in-out;
        }
        
        /* Cuando la visión está activa, se vuelve visible */
        .vision.visible {
            opacity: 1;
            transform: scale(1);
        }

        #estado { height: 20px; text-align: center; font-size: 12px; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>EL ALEPH</h1>
    
    <div class="controles">
        <button id="iniciarBtn">Iniciar Visión</button>
        <button id="detenerBtn" disabled>Cerrar los ojos</button>
        <div id="estado"></div>
    </div>

    <div id="el-aleph"></div>
<script>
        let intervaloVisión;
        let salaDeEspera = []; // Aquí guardaremos las 5 visiones que nos da la API
        let pidiendoDatos = false; // Un seguro para no pedir datos a Google dos veces al mismo tiempo

        const contenedorAleph = document.getElementById('el-aleph');
        const iniciarBtn = document.getElementById('iniciarBtn');
        const detenerBtn = document.getElementById('detenerBtn');
        const estado = document.getElementById('estado');

        // Función que llama a Vercel/Google para llenar la sala de espera
        async function reabastecerVisiones() {
            pidiendoDatos = true;
            try {
                const respuesta = await fetch('/api/poema', { method: 'POST' });
                const datos = await respuesta.json();

                if (respuesta.ok && datos.visiones) {
                    // Sumamos las nuevas visiones a las que ya estaban
                    salaDeEspera = salaDeEspera.concat(datos.visiones);
                } else {
                    console.error("Error del servidor:", datos.error);
                }
            } catch (error) {
                console.error("Fallo de conexión al reabastecer:", error);
            } finally {
                pidiendoDatos = false;
            }
        }

        // Función que toma una visión de la sala de espera y la muestra
        async function proyectarSiguienteVision() {
            // Si nos quedamos sin frases, pedimos más a la API de fondo sin detener el reloj
            if (salaDeEspera.length <= 1 && !pidiendoDatos) {
                reabastecerVisiones(); 
            }

            // Si por algún motivo la sala está vacía, no hacemos nada y esperamos al siguiente tick
            if (salaDeEspera.length === 0) return;

            // Sacamos la primera frase de la lista
            const visionActual = salaDeEspera.shift();

            // La dibujamos en la pantalla
            const nuevoDiv = document.createElement('div');
            nuevoDiv.className = 'vision';
            nuevoDiv.innerText = visionActual;
            contenedorAleph.appendChild(nuevoDiv);
            
            setTimeout(() => nuevoDiv.classList.add('visible'), 100);
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        iniciarBtn.addEventListener('click', async () => {
            iniciarBtn.disabled = true;
            detenerBtn.disabled = false;
            estado.innerText = "El infinito está ocurriendo...";
            
            // 1. Pedimos el primer lote de 5 visiones
            await reabastecerVisiones();
            
            // 2. Mostramos la primera de inmediato
            proyectarSiguienteVision();
            
            // 3. Iniciamos el reloj: mostrará una visión de la sala de espera cada 6 segundos
            intervaloVisión = setInterval(proyectarSiguienteVision, 6000);
        });

        detenerBtn.addEventListener('click', () => {
            clearInterval(intervaloVisión);
            iniciarBtn.disabled = false;
            detenerBtn.disabled = true;
            salaDeEspera = []; // Vaciamos la memoria
            estado.innerText = "La visión ha cesado.";
        });
    </script>

</body>
</html>
