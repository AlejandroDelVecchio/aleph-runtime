<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador Poético</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; font-size: 16px; cursor: pointer;}
        #resultado { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 5px; white-space: pre-wrap; min-height: 100px; }
    </style>
</head>
<body>

    <h1>Generador de Poesía</h1>
    <p>Haz clic en el botón para generar un texto poético. La API Key está protegida en el servidor.</p>
    
    <button id="generarBtn">Generar Poema</button>
    <div id="resultado">Esperando instrucción...</div>

    <script>
        document.getElementById('generarBtn').addEventListener('click', async () => {
            const cajaResultado = document.getElementById('resultado');
            cajaResultado.innerText = "Generando poema, por favor espera...";

            try {
                // Llamamos a la ruta de nuestro backend en Vercel
                const respuesta = await fetch('/api/aleph-runtime', {
                    method: 'POST'
                });

                const datos = await respuesta.json();

                if (respuesta.ok) {
                    cajaResultado.innerText = datos.poema;
                } else {
                    cajaResultado.innerText = "Error: " + datos.error;
                }

            } catch (error) {
                console.error(error);
                cajaResultado.innerText = "Hubo un error de conexión.";
            }
        });
    </script>
</body>
</html>
